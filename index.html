<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Counter</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        width: 400px;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 15px;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        font-size: 16px;
        border: 2px solid #74ebd5;
        border-radius: 8px;
        resize: none;
        box-sizing: border-box;
        outline: none;
    }

    textarea:focus {
        border-color: #5b86e5;
    }

    #counter {
        margin-top: 10px;
        font-size: 14px;
        font-weight: bold;
        color: #5b86e5;
    }

    #warning {
        margin-top: 8px;
        font-size: 14px;
        font-weight: bold;
        color: red;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Character Counter</h2>

    <textarea id="message"
        placeholder="Type your message here..."
        maxlength="200"></textarea>

    <div id="counter">0/200 characters (200 remaining)</div>
    <div id="warning"></div>
</div>

<script src="script.js"></script>

</body>
</html>
